name: Run End-to-End Tests

on:
  push:
    branches:
      - master
    paths:
      - '.github/actions/build-setup/**/*'
      - '.github/actions/install-playwright-browser/**/*'
      - '.github/workflows/test-e2e.yml'
      - 'src/**/*'
      - 'test/*' # root folder
      - 'test/config/**/*'
      - 'test/fixtures/**/*'
      - 'test/e2e/**/*'
      - 'test/shared/**/*'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.cjs'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - 'vite.config.js'
  pull_request:
    branches:
      - master
    paths:
      - '.github/actions/build-setup/**/*'
      - '.github/actions/install-playwright-browser/**/*'
      - '.github/workflows/test-e2e.yml'
      - 'src/**/*'
      - 'test/*' # root folder
      - 'test/config/**/*'
      - 'test/fixtures/**/*'
      - 'test/e2e/**/*'
      - 'test/shared/**/*'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.cjs'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - 'vite.config.js'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_e2e:
    if: ${{ ! contains(github.event.pull_request.labels.*.name, 'skip CI e2e tests') }}
    runs-on: ${{ matrix.os }}
    strategy:
      # we want to run the full build on all os: don't cancel running jobs even if one fails
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-2022]
        browser: [chromium, firefox, chrome]
        include:
          # only test WebKit on macOS
          - os: macos-14
            browser: webkit
          # only test Edge on Windows
          - os: windows-2022
            browser: msedge
          - os: macos-14
            browser: chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Free disk space on Ubuntu runner
        if: runner.os == 'Linux'
        uses: ./.github/actions/free-runner-disk-space-ubuntu
# START temporary workaround
# Browser download failure with Node 24. See https://github.com/microsoft/playwright/issues/41185 and https://github.com/microsoft/playwright-cli/issues/419#issuecomment-4646958277 (that mentions that it should work with Node 22)
#      - name: Build Setup
#        uses: ./.github/actions/build-setup
      - name: Setup node
        uses: actions/setup-node@v6
        with:
#          node-version-file: '.nvmrc'
          node-version: '22'
          registry-url: ${{ inputs.registry-url }}
      - name: Install dependencies
        uses: bahmutov/npm-install@v1
        if: inputs.install-dependencies == 'true'
        with:
          install-command: npm ci --ignore-scripts --prefer-offline --audit false
# END OF temporary workaround
      - name: Install ${{matrix.browser}}
        uses: ./.github/actions/install-playwright-browser
        with:
          browser: ${{matrix.browser}}
      - name: Log disk space
        uses: ./.github/actions/log-disk-space
      - name: Test Application End to End
        id: 'test_e2e'
        env:
          BROWSERS: ${{matrix.browser}}
        run: npm run test:e2e:verbose
      - name: Log disk space
        uses: ./.github/actions/log-disk-space
        if: always()
      - name: Upload e2e test results
        if: ${{ failure() && steps.test_e2e.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-${{matrix.browser}}-test-results-${{matrix.os}}-${{github.sha}}
          path: build/test-report/e2e
